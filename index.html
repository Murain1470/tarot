<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>秘儀塔羅</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #f0d080;
  --gold-dim: #7a6030;
  --deep: #06030f;
  --purple-mid: #1a0f35;
  --purple-glow: #4a1f8a;
  --card-w: 120px;
  --card-h: 200px;
  --gap: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--deep);
  color: var(--gold-light);
  font-family: 'Noto Serif TC', serif;
  height: 100dvh;
  overflow: hidden;
  user-select: none;
}

#stars-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
#converge-overlay {
  position:fixed; inset:0; z-index:1; pointer-events:none;
  opacity:0;
  background:radial-gradient(circle at 50% 55%, rgba(50,10,100,.82) 0%, rgba(20,5,50,.55) 45%, rgba(6,3,15,.3) 75%, transparent 100%);
  transition:opacity .5s ease;
}
#energy-flash {
  position:fixed; inset:0; z-index:50; pointer-events:none;
  opacity:0; background:radial-gradient(circle at 50% 55%, rgba(255,240,120,.22) 0%, rgba(201,168,76,.08) 45%, transparent 75%);
}
@keyframes energyFlash {
  0%  { opacity:0; transform:scale(.85); }
  18% { opacity:1; transform:scale(1.04); }
  55% { opacity:.6; transform:scale(1); }
  100%{ opacity:0; transform:scale(1); }
}
/* Card-back holographic shimmer (S4) */
.card-back-holo {
  position:absolute; inset:0; border-radius:8px;
  mix-blend-mode:color-dodge; pointer-events:none; z-index:8; opacity:.6;
  background: repeating-linear-gradient(
    105deg,
    rgba(255,50,80,.22)  0%,
    rgba(255,180,40,.22) 15%,
    rgba(80,255,120,.22) 30%,
    rgba(40,200,255,.22) 45%,
    rgba(140,60,255,.22) 60%,
    rgba(255,50,160,.22) 75%,
    rgba(255,50,80,.22)  90%
  );
  background-size: 200% 100%;
  background-position-x: 0%;
}

/* ═══ SCREENS ═══ */
.screen {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 28px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease;
}
.screen.active { opacity:1; pointer-events:all; }

/* ── S1: ENTRY ── */
#s-entry { background: radial-gradient(ellipse at center, #1a0f35 0%, #06030f 70%); gap: 28px; }
.sigil { width:110px; height:110px; animation: sigil-rot 20s linear infinite; flex-shrink:0; }
@keyframes sigil-rot { to { transform:rotate(360deg); } }
.brand { font-family:'Cinzel Decorative',serif; font-size:26px; color:var(--gold); letter-spacing:.1em; text-shadow:0 0 30px rgba(201,168,76,.6); text-align:center; }
.brand-sub { font-size:11px; color:rgba(201,168,76,.45); letter-spacing:.35em; text-transform:uppercase; text-align:center; margin-top:4px; }
.gold-btn {
  background: transparent; border: 1px solid var(--gold);
  color: var(--gold-light); font-family: 'Cinzel',serif;
  font-size: 13px; letter-spacing: .2em; padding: 14px 40px;
  cursor: pointer; transition: all .3s; width:100%; max-width:280px;
}
.gold-btn:active { transform:scale(.97); box-shadow:0 0 18px rgba(201,168,76,.4); }

/* ── S2: QUESTION ── */
#s-question { background: radial-gradient(ellipse at 50% 30%, #1a0f35 0%, #06030f 65%); gap: 20px; justify-content: flex-start; padding-top: 72px; }
.q-label { font-family:'Cinzel',serif; font-size:11px; letter-spacing:.3em; color:var(--gold-dim); text-transform:uppercase; text-align:center; }
.q-title { font-family:'Cinzel Decorative',serif; font-size:20px; color:var(--gold); text-align:center; line-height:1.5; text-shadow:0 0 20px rgba(201,168,76,.4); }
.q-hint { font-size:12px; color:rgba(240,208,128,.4); text-align:center; line-height:1.8; letter-spacing:.05em; }
textarea#question-input {
  width:100%; max-width:320px;
  background: rgba(26,15,53,.6); border:1px solid rgba(201,168,76,.25); border-radius:4px;
  color:var(--gold-light); font-family:'Noto Serif TC',serif;
  font-size:15px; line-height:1.8; letter-spacing:.05em;
  padding:16px 18px; resize:none; height:110px; outline:none;
  transition:border-color .3s; -webkit-appearance:none;
}
textarea#question-input::placeholder { color:rgba(201,168,76,.25); }
textarea#question-input:focus { border-color:rgba(201,168,76,.6); }
.q-examples { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; width:100%; max-width:320px; }
.q-example { border:1px solid rgba(201,168,76,.2); padding:6px 14px; font-size:11px; color:rgba(201,168,76,.55); cursor:pointer; border-radius:2px; letter-spacing:.05em; transition:all .2s; }
.q-example:active { border-color:var(--gold); color:var(--gold); }

/* ── S3: LONG PRESS RITUAL ── */
#s-shuffle { background:var(--deep); gap:18px; }
.shuffle-title { font-family:'Cinzel Decorative',serif; font-size:18px; color:var(--gold); letter-spacing:.1em; text-align:center; }
.shuffle-q-echo { font-size:13px; color:rgba(240,208,128,.6); text-align:center; line-height:1.8; letter-spacing:.05em; max-width:260px; font-style:italic; }
.shuffle-hint { font-size:11px; color:rgba(201,168,76,.32); letter-spacing:.12em; text-align:center; line-height:1.9; }

.press-zone {
  width:160px; height:160px; position:relative;
  cursor:pointer; touch-action:none;
  -webkit-user-select:none; user-select:none;
  flex-shrink:0;
}
.press-ring-svg { position:absolute; inset:0; width:100%; height:100%; transform:rotate(-90deg); pointer-events:none; }
.press-ring-track { fill:none; stroke:rgba(201,168,76,.1); stroke-width:1.5; }
.press-ring-fill {
  fill:none; stroke:var(--gold); stroke-width:2.5;
  stroke-dasharray:440; stroke-dashoffset:440;
  stroke-linecap:round;
  filter:drop-shadow(0 0 5px rgba(201,168,76,.9));
  transition:stroke-dashoffset .05s linear;
}
.press-orb-inner {
  position:absolute; inset:14px; border-radius:50%;
  background:radial-gradient(circle, rgba(74,31,138,.88) 0%, rgba(6,3,15,0) 75%);
  border:1px solid rgba(201,168,76,.14);
  display:flex; align-items:center; justify-content:center;
  font-size:52px;
  transition:box-shadow .4s ease, transform .4s ease;
}
.press-zone.pressing .press-orb-inner {
  transform:scale(1.08);
  box-shadow:0 0 55px rgba(74,31,138,.95), 0 0 110px rgba(74,31,138,.35);
}
.press-label {
  font-family:'Cinzel',serif; font-size:10px; letter-spacing:.22em;
  color:rgba(201,168,76,.32); text-align:center;
  transition:color .4s, letter-spacing .4s;
}
.press-zone.pressing + .press-label { color:rgba(201,168,76,.8); letter-spacing:.3em; }

/* ── S4: CARD SELECTION ── */
#s-cards { background:var(--deep); justify-content:flex-start; padding:0; gap:0; }
.cards-header { padding:22px 24px 10px; text-align:center; flex-shrink:0; }
.cards-title { font-family:'Cinzel Decorative',serif; font-size:16px; color:var(--gold); letter-spacing:.12em; text-shadow:0 0 16px rgba(201,168,76,.4); }
.cards-q-echo { font-size:11px; color:rgba(240,208,128,.4); letter-spacing:.05em; margin-top:5px; max-width:280px; margin-inline:auto; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.header-line { width:50px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:8px auto 0; }
.tilt-hint { text-align:center; font-size:11px; color:rgba(240,208,128,.32); letter-spacing:.1em; padding:6px 24px; flex-shrink:0; }
.scene { flex:1; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; min-height:0; perspective:900px; }
.glow-layer { position:absolute; inset:0; pointer-events:none; z-index:0; }
.ambient-glow { position:absolute; border-radius:50%; filter:blur(60px); opacity:.1; }
.glow-1 { width:180px; height:180px; background:var(--purple-glow); top:15%; left:5%; }
.glow-2 { width:140px; height:140px; background:#1f5a99; bottom:20%; right:5%; }
.card-strip { display:flex; align-items:center; gap:0; position:relative; z-index:1; transform-style:preserve-3d; will-change:transform; padding:30px 60px; }

/* ── CARD ── */
.tarot-card { width:var(--card-w); height:var(--card-h); flex-shrink:0; position:relative; transform-style:preserve-3d; cursor:pointer; border-radius:8px; margin-left:-92px; }
.tarot-card:first-child { margin-left:0; }
.tarot-card.is-flipping { transition:transform .75s cubic-bezier(.4,0,.2,1) !important; }
.card-face { position:absolute; inset:0; border-radius:8px; backface-visibility:hidden; -webkit-backface-visibility:hidden; overflow:hidden; }
.card-back { background:var(--purple-mid); border:1px solid rgba(201,168,76,.3); display:flex; align-items:center; justify-content:center; }
.card-back-inner { width:88%; height:88%; border:1px solid rgba(201,168,76,.18); border-radius:4px; display:flex; align-items:center; justify-content:center; background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(201,168,76,.04) 8px,rgba(201,168,76,.04) 9px); }
.card-back-symbol { font-size:30px; opacity:.4; }
.card-front { transform:rotateY(180deg); background:linear-gradient(160deg,#1c1030 0%,#0a061a 100%); border:1px solid rgba(201,168,76,.45); display:flex; flex-direction:column; align-items:center; padding:6px 6px 10px; }
.card-front-border { position:absolute; inset:5px; border:1px solid rgba(201,168,76,.18); border-radius:4px; pointer-events:none; }
.card-number { display:none; }
.card-artwork { width:100%; height:148px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:44px; position:relative; overflow:hidden; border-radius:4px; }
.card-artwork img { width:100%; height:100%; object-fit:cover; display:block; }
.card-artwork::after { content:''; position:absolute; inset:0; border-radius:4px; box-shadow:inset 0 0 16px rgba(6,3,15,.75); pointer-events:none; z-index:1; }
.card-artwork-glow { position:absolute; inset:0; background:radial-gradient(ellipse,rgba(201,168,76,.1) 0%,transparent 70%); }
.card-name { font-family:'Cinzel',serif; font-size:7.5px; letter-spacing:.16em; color:var(--gold); text-align:center; margin-top:5px; line-height:1.4; }
.card-name-zh { font-family:'Noto Serif TC',serif; font-weight:300; font-size:8.5px; color:rgba(201,168,76,.7); margin-top:3px; letter-spacing:.08em; }
.card-pos-label { position:absolute; top:-26px; left:50%; transform:translateX(-50%); font-family:'Cinzel',serif; font-size:8px; letter-spacing:.2em; color:rgba(201,168,76,.75); white-space:nowrap; opacity:0; transition:opacity .4s; pointer-events:none; }
@keyframes breathe { 0%,100%{opacity:.85} 50%{opacity:1} }
.idle-breathe { animation:breathe 3s ease-in-out infinite; }
.focus-ring { position:absolute; inset:-4px; border:1px solid var(--gold); border-radius:10px; opacity:0; pointer-events:none; animation:focus-pulse 2s ease-in-out infinite; }
@keyframes focus-pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
.tarot-card.is-focused .focus-ring { opacity:1; }
.tarot-card.is-focused .card-pos-label { opacity:1; }

.slot-indicator { display:flex; gap:16px; justify-content:center; padding:6px 0; flex-shrink:0; }
.slot-pip { display:flex; flex-direction:column; align-items:center; gap:4px; }
.slot-pip-dot { width:6px; height:6px; border-radius:50%; background:rgba(201,168,76,.15); transition:all .3s; }
.slot-pip-label { font-size:8px; letter-spacing:.12em; color:rgba(201,168,76,.3); font-family:'Cinzel',serif; }
.slot-pip.filled .slot-pip-dot { background:var(--gold); box-shadow:0 0 8px rgba(201,168,76,.6); }
.slot-pip.filled .slot-pip-label { color:rgba(201,168,76,.7); }

.cards-footer { padding:10px 24px 20px; display:flex; align-items:center; justify-content:center; gap:12px; flex-shrink:0; }
.footer-btn { background:none; border:1px solid rgba(201,168,76,.22); color:rgba(201,168,76,.55); font-family:'Cinzel',serif; font-size:10px; letter-spacing:.15em; padding:9px 16px; cursor:pointer; border-radius:2px; transition:all .3s; }
.footer-btn:active { border-color:var(--gold); color:var(--gold); box-shadow:0 0 10px rgba(201,168,76,.3); }
.footer-btn.primary { border-color:rgba(201,168,76,.5); color:rgba(201,168,76,.85); font-size:11px; padding:10px 20px; }

/* ── S5: READING ── */
#s-reading { background:var(--deep); justify-content:flex-start; padding:0; overflow:hidden; }
.reading-scroll { width:100%; height:100%; overflow-y:auto; padding:36px 24px 60px; -webkit-overflow-scrolling:touch; }
.reading-header { text-align:center; margin-bottom:16px; }
.reading-title { font-family:'Cinzel Decorative',serif; font-size:17px; color:var(--gold); letter-spacing:.12em; text-shadow:0 0 20px rgba(201,168,76,.4); }
.reading-question { font-size:12px; color:rgba(240,208,128,.5); margin-top:8px; letter-spacing:.05em; font-style:italic; line-height:1.7; }

/* Holographic spread */
.holo-spread { display:flex; justify-content:center; gap:14px; margin:8px 0 16px; perspective:700px; }
.holo-col { display:flex; flex-direction:column; align-items:center; }

/* Holo card */
.holo-card-wrap {
  width:84px; height:140px;
  position:relative; transform-style:preserve-3d;
  cursor:pointer; flex-shrink:0;
  transition:opacity .4s;
}
.holo-card-wrap.locked { opacity:.38; cursor:not-allowed; pointer-events:none; }

.holo-inner {
  width:100%; height:100%;
  position:relative; transform-style:preserve-3d;
  transition:transform .88s cubic-bezier(.4,0,.2,1);
  border-radius:8px;
}
.holo-inner.flipped { transform:rotateY(180deg); }

.holo-back, .holo-face {
  position:absolute; inset:0; border-radius:8px;
  backface-visibility:hidden; -webkit-backface-visibility:hidden; overflow:hidden;
}
.holo-back {
  background:var(--purple-mid); border:1px solid rgba(201,168,76,.28);
  display:flex; align-items:center; justify-content:center;
}
.holo-back-inner {
  width:86%; height:86%;
  border:1px solid rgba(201,168,76,.14); border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  background:repeating-linear-gradient(45deg,transparent,transparent 7px,rgba(201,168,76,.04) 7px,rgba(201,168,76,.04) 8px);
  font-size:20px; color:rgba(201,168,76,.28);
}
.holo-face {
  transform:rotateY(180deg);
  background:linear-gradient(160deg,#1c1030 0%,#0a061a 100%);
  border:1px solid rgba(201,168,76,.5);
  display:flex; flex-direction:column; align-items:center;
  padding:6px 5px; overflow:hidden;
}

/* Parallax layers inside holo-face */
.holo-bg-layer {
  position:absolute; inset:0; border-radius:8px;
  background:repeating-linear-gradient(45deg,transparent,transparent 7px,rgba(201,168,76,.04) 7px,rgba(201,168,76,.04) 8px);
  will-change:transform; pointer-events:none; z-index:0;
}
.holo-face-border { position:absolute; inset:4px; border:1px solid rgba(201,168,76,.18); border-radius:5px; pointer-events:none; z-index:3; }
.holo-card-num { display:none; }
.holo-art-layer {
  width:100%; height:100px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  position:relative; z-index:2; font-size:34px;
  will-change:transform; overflow:hidden; border-radius:4px;
}
.holo-art-layer img { width:100%; height:100%; object-fit:cover; display:block; }
.holo-art-layer::after { content:''; position:absolute; inset:0; border-radius:4px; box-shadow:inset 0 0 14px rgba(6,3,15,.8); pointer-events:none; z-index:1; }
.holo-art-glow { position:absolute; inset:0; background:radial-gradient(ellipse,rgba(201,168,76,.13) 0%,transparent 70%); pointer-events:none; }
.holo-card-name { font-family:'Cinzel',serif; font-size:6.5px; letter-spacing:.14em; color:var(--gold); text-align:center; line-height:1.4; position:relative; z-index:2; margin-top:5px; }
.holo-card-zh { font-family:'Noto Serif TC',serif; font-weight:300; font-size:7px; color:rgba(201,168,76,.65); margin-top:3px; letter-spacing:.06em; position:relative; z-index:2; }

/* Holographic shimmer layers — position-x driven by JS */
.holo-shimmer {
  position:absolute; inset:0; border-radius:8px;
  mix-blend-mode:color-dodge; pointer-events:none; z-index:5;
  opacity:.65;
  background: repeating-linear-gradient(
    105deg,
    rgba(255,50,80,.2)  0%,
    rgba(255,180,40,.2) 15%,
    rgba(80,255,120,.2) 30%,
    rgba(40,200,255,.2) 45%,
    rgba(140,60,255,.2) 60%,
    rgba(255,50,160,.2) 75%,
    rgba(255,50,80,.2)  90%
  );
  background-size: 200% 100%;
  background-position-x: 50%;
}
.holo-foil {
  position:absolute; inset:0; border-radius:8px;
  mix-blend-mode:screen; pointer-events:none; z-index:6;
}
.holo-sparkle {
  position:absolute; inset:0; border-radius:8px;
  mix-blend-mode:screen; pointer-events:none; z-index:7;
  opacity:0;
}

.holo-pos-label {
  font-family:'Cinzel',serif; font-size:8px; letter-spacing:.2em;
  color:rgba(201,168,76,.38); text-align:center;
  margin-top:7px; height:13px;
  transition:color .4s;
}
.holo-pos-label.revealed { color:rgba(201,168,76,.8); }

.holo-tap-hint {
  position:absolute; bottom:-2px; left:50%; transform:translateX(-50%);
  font-size:8px; color:rgba(201,168,76,.5); letter-spacing:.1em;
  white-space:nowrap; pointer-events:none;
  animation:breathe 2s ease-in-out infinite;
}

/* Reading sections */
.reading-divider { height:1px; background:linear-gradient(90deg,transparent,rgba(201,168,76,.3),transparent); margin:16px 0; }
.reading-section { margin-bottom:20px; }
.reading-section-title { font-family:'Cinzel',serif; font-size:10px; letter-spacing:.3em; color:var(--gold-dim); text-transform:uppercase; margin-bottom:12px; display:flex; align-items:center; gap:10px; }
.reading-section-title::before,.reading-section-title::after { content:''; flex:1; height:1px; background:rgba(201,168,76,.15); }
.reading-practical { color:rgba(240,208,128,.85); line-height:2; font-size:13px; letter-spacing:.04em; white-space:pre-wrap; }
.typing-cursor { display:inline-block; width:2px; height:1em; background:var(--gold); margin-left:2px; vertical-align:middle; animation:blink .8s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.reveal-next-btn {
  display:none; width:100%;
  background:transparent; border:1px solid rgba(201,168,76,.28);
  color:rgba(201,168,76,.65); font-family:'Cinzel',serif;
  font-size:11px; letter-spacing:.2em; padding:12px;
  cursor:pointer; transition:all .3s; margin-top:8px; border-radius:2px;
}
.reveal-next-btn.visible { display:block; }
.reveal-next-btn:active { border-color:var(--gold); color:var(--gold); }

.reading-loading { display:flex; flex-direction:column; align-items:center; gap:16px; padding:32px 0; }
.loading-orb { width:52px; height:52px; border-radius:50%; border:1px solid rgba(201,168,76,.3); display:flex; align-items:center; justify-content:center; font-size:24px; animation:orb-pulse 1.5s ease-in-out infinite; }
@keyframes orb-pulse { 0%,100%{box-shadow:0 0 20px rgba(74,31,138,.4);transform:scale(1)} 50%{box-shadow:0 0 50px rgba(74,31,138,.8);transform:scale(1.05)} }
.loading-text { font-size:11px; color:rgba(201,168,76,.45); letter-spacing:.15em; }

.reading-restart-btn { margin-top:32px; width:100%; background:transparent; border:1px solid rgba(201,168,76,.22); color:rgba(201,168,76,.55); font-family:'Cinzel',serif; font-size:11px; letter-spacing:.2em; padding:14px; cursor:pointer; transition:all .3s; }
.reading-restart-btn:active { border-color:var(--gold); color:var(--gold); }

/* API KEY PROMPT */
.api-key-section { margin-top:24px; padding:16px; border:1px solid rgba(201,168,76,.15); border-radius:4px; background:rgba(26,15,53,.4); }
.api-key-label { font-size:11px; color:rgba(201,168,76,.5); letter-spacing:.1em; margin-bottom:8px; text-align:center; }
.api-key-input { width:100%; background:rgba(6,3,15,.6); border:1px solid rgba(201,168,76,.2); border-radius:3px; color:var(--gold-light); font-family:monospace; font-size:12px; padding:10px 12px; outline:none; letter-spacing:.05em; }
.api-key-input::placeholder { color:rgba(201,168,76,.2); }
.api-key-btn { width:100%; margin-top:8px; background:none; border:1px solid rgba(201,168,76,.3); color:rgba(201,168,76,.7); font-family:'Cinzel',serif; font-size:11px; letter-spacing:.15em; padding:10px; cursor:pointer; border-radius:2px; }

/* ── TOAST ── */
.toast { position:fixed; top:52px; left:50%; transform:translateX(-50%) translateY(-16px); background:rgba(201,168,76,.12); border:1px solid rgba(201,168,76,.28); color:var(--gold-light); font-size:11px; letter-spacing:.1em; padding:9px 22px; border-radius:2px; opacity:0; transition:all .3s; z-index:200; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div id="converge-overlay"></div>
<div id="energy-flash"></div>

// ═══ STARS ═══
(function(){
  const c=document.getElementById('stars-canvas'), ctx=c.getContext('2d');
  let stars=[],W,H;
  function resize(){W=c.width=innerWidth; H=c.height=innerHeight;}
  function init(){stars=[];for(let i=0;i<180;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+.2,a:Math.random(),phase:Math.random()*Math.PI*2,spd:Math.random()*.003+.001});}
  let t=0;
  function draw(){
    ctx.clearRect(0,0,W,H); t+=.01;
    stars.forEach(s=>{
      const al=s.a*(.4+.6*Math.sin(t*s.spd*100+s.phase));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(240,220,160,${al})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); init(); draw();
  window.addEventListener('resize',()=>{resize();init();});
})();

const pressZone      = document.getElementById('press-zone');
const pressRingFill  = document.getElementById('press-ring-fill');
const pressOrb       = document.getElementById('press-orb');
const pressLabel     = document.getElementById('press-label');
const convergeOverlay= document.getElementById('converge-overlay');

pressRingFill.style.strokeDasharray  = RING_CIRC;
pressRingFill.style.strokeDashoffset = RING_CIRC;

let pressStart=null, pressRAF=null;
const PRESS_DURATION = 3000;
const ORB_SEQ = ['🔮','🌀','🌟','✨','⚡'];

function startPress(e){
  e.preventDefault();
  if(pressStart!==null) return;
  pressStart = performance.now();
  pressZone.classList.add('pressing');
  convergeOverlay.style.opacity = '1';
  pressRAF = requestAnimationFrame(tickPress);
}
function tickPress(){
  if(pressStart===null) return;
  const elapsed = performance.now()-pressStart;
  const p = Math.min(elapsed/PRESS_DURATION, 1);
  pressRingFill.style.strokeDashoffset = RING_CIRC*(1-p);
  pressOrb.textContent = ORB_SEQ[Math.min(Math.floor(p*ORB_SEQ.length), ORB_SEQ.length-1)];
  const secs = Math.ceil((PRESS_DURATION-elapsed)/1000);
  pressLabel.textContent = p<1 ? `${secs} 秒後啟動…` : '✦ 能量注入完成 ✦';
  if(p<1){ pressRAF=requestAnimationFrame(tickPress); }
  else { completePress(); }
}
function cancelPress(){
  if(pressStart===null) return;
  pressStart=null; cancelAnimationFrame(pressRAF);
  pressZone.classList.remove('pressing');
  convergeOverlay.style.opacity='0';
  pressRingFill.style.strokeDashoffset=RING_CIRC;
  pressOrb.textContent='🔮';
  pressLabel.textContent='長按三秒 · 注入能量';
}
function completePress(){
  pressStart=null; cancelAnimationFrame(pressRAF);
  pressZone.classList.remove('pressing');
  // Energy flash burst
  const flash=document.getElementById('energy-flash');
  flash.style.animation='none';
  flash.offsetWidth; // reflow
  flash.style.animation='energyFlash .65s ease-out forwards';
  // Screen briefly darkens then flashes
  convergeOverlay.style.opacity='1';
  setTimeout(()=>{ convergeOverlay.style.opacity='0'; }, 280);
  setTimeout(()=>{
    pressRingFill.style.strokeDashoffset=RING_CIRC;
    pressOrb.textContent='🔮';
    pressLabel.textContent='長按三秒 · 注入能量';
    initCardSelection();
    goTo('s-cards');
    if(!rafStarted){ rafStarted=true; renderLoop(); }
  }, 580);
}
pressZone.addEventListener('pointerdown', startPress);
pressZone.addEventListener('pointerup',   cancelPress);
pressZone.addEventListener('pointercancel',cancelPress);
pressZone.addEventListener('pointerleave', cancelPress);

function initCardSelection(){
  selectedSlot=0; selectedCards=[null,null,null]; currentX=0; cardVelocity=0; focusedIndex=0; latestTiltAngle=0;
  let deck=[...ALL_CARDS];
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  cards=deck;
  document.getElementById('cards-q-echo').textContent=question;
  buildCardStrip(); updateSlotIndicator();
}

function buildCardStrip(){
  const strip=document.getElementById('card-strip');
  strip.innerHTML=''; strip.style.transform='translateX(0)';
  cards.forEach((card,i)=>{
    const el=document.createElement('div');
    el.className='tarot-card idle-breathe'; el.style.animationDelay=`${i*.12}s`; el.dataset.index=i;
    el.innerHTML=`
      <div class="card-pos-label"></div>
      <div class="card-face card-back"><div class="card-back-inner"><span class="card-back-symbol">✦</span></div><div class="card-back-holo"></div></div>
      <div class="card-face card-front">
        <div class="card-front-border"></div>
        <div class="card-number">${card.num}</div>
        <div class="card-artwork"><img src="${CARD_IMG[card.id]}" loading="lazy" alt="${card.nameZh}"></div>
        <div class="card-name">${card.name}</div>
        <div class="card-name-zh">${card.nameZh}</div>
      </div>
      <div class="focus-ring"></div>
    `;
    strip.appendChild(el);
  });
  updateFocus(0,false);
}

function getCardEls(){ return [...document.getElementById('card-strip').querySelectorAll('.tarot-card')]; }

function updateFocus(idx, animate=true){
  const els=getCardEls();
  els.forEach((el,i)=>{
    el.classList.remove('is-focused');
    const dist = Math.abs(i-idx);
    const bri  = dist===0 ? 1 : dist===1 ? 0.78 : 0.5;
    const slot = selectedCards.findIndex(sc=>sc&&sc.deckIndex===i);

    // 3D arc: unfocused cards curve away and recede
    const arcRotY  = slot>=0 ? 180 : (i-idx)*7;
    const arcTZ    = -Math.abs(i-idx)*16;
    const arcTY    = Math.abs(i-idx)*4;

    el.style.transition = animate ? 'filter .3s, transform .3s' : 'none';
    el.style.transform  = `rotateY(${arcRotY}deg) translateZ(${arcTZ}px) translateY(${arcTY}px)`;
    el.style.filter     = `brightness(${bri})`;
    el.querySelector('.card-pos-label').textContent = slot>=0 ? POSITIONS[slot] : '';
  });
  if(els[idx]) els[idx].classList.add('is-focused');
  focusedIndex=idx;
}

function updateSlotIndicator(){
  document.querySelectorAll('.slot-pip').forEach((pip,i)=>pip.classList.toggle('filled',selectedCards[i]!==null));
}

document.getElementById('select-card-btn').addEventListener('click',()=>{
  if(selectedSlot>=3) return;
  const cardData=cards[focusedIndex];
  if(selectedCards.some(sc=>sc&&sc.id===cardData.id)){showToast('這張牌已被選取');return;}
  selectedCards[selectedSlot]={...cardData,deckIndex:focusedIndex};
  const el=getCardEls()[focusedIndex];
  el.classList.remove('idle-breathe');
  el.style.transition='transform .75s cubic-bezier(.4,0,.2,1)';
  el.style.transform=`translateY(-6px) rotateY(180deg)`;
  el.querySelector('.card-pos-label').textContent=POSITIONS[selectedSlot];

  // Light streak
  const streak=document.createElement('div');
  streak.style.cssText='position:absolute;top:50%;left:50%;width:70px;height:2px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.95),transparent);transform:translate(-50%,-50%);border-radius:1px;pointer-events:none;z-index:99;';
  el.appendChild(streak);
  streak.animate(
    [{opacity:0,transform:'translate(-50%,-50%) scaleX(0)'},{opacity:1,transform:'translate(-50%,-50%) scaleX(1)'},{opacity:0,transform:'translate(-50%,-50%) scaleX(3.5)'}],
    {duration:520,easing:'ease-out'}
  ).onfinish=()=>streak.remove();

  selectedSlot++;
  updateSlotIndicator();
  if(selectedSlot>=3){ showToast('三張牌已選定，正在解讀…'); setTimeout(startReading,900); }
  else showToast(`已選「${cardData.nameZh}」· 請繼續選第 ${selectedSlot+1} 張`);
});

function handleOrientation(e){
  rawGamma = e.gamma||0;
  rawBeta  = e.beta||0;
  if(e.gamma===null) return;
  // Store calibrated tilt for velocity physics (S4)
  latestTiltAngle = Math.max(-45, Math.min(45, e.gamma-gammaRef));
}
let lastAcc={x:0,y:0,z:0}, shakeThrottle=false;
function handleMotion(e){
  const acc=e.acceleration; if(!acc) return;
  const d=Math.abs(acc.x-lastAcc.x)+Math.abs(acc.y-lastAcc.y)+Math.abs(acc.z-lastAcc.z);
  lastAcc={x:acc.x||0,y:acc.y||0,z:acc.z||0};
  if(d>28&&!shakeThrottle&&document.getElementById('s-cards').classList.contains('active')){
    shakeThrottle=true; document.getElementById('select-card-btn').click();
    setTimeout(()=>shakeThrottle=false,1300);
  }
}

// Desktop mouse fallback — S4 tilt + S5 holo
document.addEventListener('mousemove',e=>{
  const mx=(e.clientX/window.innerWidth-.5);
  if(document.getElementById('s-cards').classList.contains('active')){
    latestTiltAngle = mx*38;   // ±19° equivalent
  }
  if(document.getElementById('s-reading').classList.contains('active')){
    rawGamma = mx*28;
    rawBeta  = (e.clientY/window.innerHeight-.5)*18;
  }
});

// ═══ HOLOGRAPHIC EFFECT (S5 face cards) ═══
function updateHoloEffect(){
  holoGamma += (rawGamma - holoGamma) * 0.055;
  holoBeta  += (rawBeta  - holoBeta)  * 0.055;

  const shimmerEls = document.querySelectorAll('.holo-shimmer');
  if(!shimmerEls.length) return;

  // ③ Shift background-position-x with tilt — light flows smoothly
  const posX = 50 + holoGamma * 1.9;
  shimmerEls.forEach(el=>{ el.style.backgroundPositionX = `${posX}%`; });

  // Foil highlight position
  const fx = 50 + holoGamma * 1.6;
  const fy = 50 + holoBeta  * 0.9;
  document.querySelectorAll('.holo-foil').forEach(el=>{
    el.style.background = `radial-gradient(ellipse 55% 38% at ${fx}% ${fy}%, rgba(255,255,255,.13) 0%, rgba(255,255,255,.04) 45%, transparent 72%)`;
  });

  // Parallax: background pattern only (artwork image stays fixed)
  document.querySelectorAll('.holo-bg-layer').forEach(el=>{
    el.style.transform = `translate(${holoGamma*.38}px,${holoBeta*.22}px)`;
  });

  // Sparkle vein at steeper angles
  const sparkleOp = Math.min(Math.abs(holoGamma)/28, .75);
  document.querySelectorAll('.holo-sparkle').forEach(el=>{
    el.style.opacity = sparkleOp;
    el.style.background = `radial-gradient(ellipse 3px 90% at ${50+holoGamma*1.8}% 50%, rgba(255,248,200,.7) 0%, transparent 100%)`;
  });
}

// ═══ S4 CARD-BACK HOLO ═══
function updateS4BackHolo(){
  backHoloGamma += (rawGamma - backHoloGamma) * 0.06;
  // Shift background-position-x: 0%=left edge, 100%=right edge of 200%-wide gradient
  const posX = 50 + backHoloGamma * 2.2; // ±45° → ±99% shift
  document.querySelectorAll('.card-back-holo').forEach(el=>{
    el.style.backgroundPositionX = `${posX}%`;
  });
}

// ═══ RENDER LOOP — velocity physics ═══
function renderLoop(){
  const inCards = document.getElementById('s-cards').classList.contains('active');

  if(inCards && cards.length){
    // ① Lerp tilt input → absorbs hand tremor
    smoothedTilt += (latestTiltAngle - smoothedTilt) * 0.10;
    const tilt = Math.abs(smoothedTilt) > 2 ? smoothedTilt : 0; // ±2° deadzone

    // Tilt → velocity (reduced sensitivity)
    cardVelocity += tilt * 0.18;
    cardVelocity *= 0.84;              // friction

    currentX += cardVelocity;

    // Soft wall at both ends
    const halfSpan = (cards.length - 1) * CARD_STEP * 0.5 + CARD_STEP * 0.4;
    if(currentX >  halfSpan){ currentX =  halfSpan; cardVelocity *= -0.25; }
    if(currentX < -halfSpan){ currentX = -halfSpan; cardVelocity *= -0.25; }

    // Continuous float position (not discrete index)
    const centerFloat = -currentX / CARD_STEP + (cards.length - 1) / 2;
    const newFocus    = Math.max(0, Math.min(cards.length-1, Math.round(centerFloat)));

    // ② Magnetic snap: kick in earlier, pull harder
    if(Math.abs(cardVelocity) < 1.5){
      const snapX = -(newFocus - (cards.length-1)/2) * CARD_STEP;
      currentX   += (snapX - currentX) * 0.14;
      cardVelocity *= 0.75; // bleed off remaining velocity faster
    }

    const strip = document.getElementById('card-strip');
    const glow  = document.getElementById('glow-layer');
    strip.style.transform = `translateX(${currentX}px)`;
    glow.style.transform  = `translateX(${currentX * 1.4}px)`;

    // Update ALL card 3D transforms every frame from float position (no CSS transition)
    const els = document.getElementById('card-strip').querySelectorAll('.tarot-card');
    els.forEach((el, i) => {
      const offset = i - centerFloat;           // continuous float
      const dist   = Math.abs(offset);
      const bri    = Math.max(0.42, 1 - dist * 0.2);
      const slot   = selectedCards.findIndex(sc => sc && sc.deckIndex === i);
      el.style.transition = 'filter .25s';      // only filter fades, transform is raw
      if(slot >= 0){
        el.style.transform = `translateY(-14px) rotateY(180deg)`;
      } else {
        // Cards stay face-on (no rotateY) — like a stacked deck
        // Focused card lifts up and comes forward; others stay flat
        const pop = Math.max(0, 1 - dist * 1.8);
        const ty  = -pop * 20;          // lift up
        const tz  = pop * 30;           // come forward
        const sc  = 1 + pop * 0.06;    // very slight scale
        el.style.transform = `translateY(${ty}px) translateZ(${tz}px) scale(${sc})`;
      }
      el.style.filter  = `brightness(${bri})`;
      el.style.zIndex  = Math.round(100 - dist * 8);  // focused card always on top
      el.classList.toggle('is-focused', i === newFocus);
    });
    focusedIndex = newFocus;

    // Card-back holo shimmer
    updateS4BackHolo();
  }

  updateHoloEffect();
  requestAnimationFrame(renderLoop);
}

// ═══ S5: READING ═══
function startReading(){
  readingBuckets=null; revealedCount=0;
  if(!rafStarted){ rafStarted=true; renderLoop(); }
  goTo('s-reading');
  document.getElementById('reading-q').textContent=`「${question}」`;
  document.getElementById('restart-btn').style.display='none';
  buildHoloSpread();
  document.getElementById('reading-content').innerHTML=
    '<div style="text-align:center;font-size:11px;color:rgba(201,168,76,.32);letter-spacing:.15em;padding:12px 0 4px;">點擊牌面以揭示命運</div>';
  if(GEMINI_KEY){ callGemini(); } else { showApiKeyPrompt(); }
}

function buildHoloSpread(){
  const spread=document.getElementById('holo-spread');
  spread.innerHTML='';
  selectedCards.forEach((sc,i)=>{
    const col=document.createElement('div');
    col.className='holo-col';
    col.innerHTML=`
      <div class="holo-card-wrap ${i===0?'':'locked'}" id="holo-card-${i}" data-slot="${i}">
        <div class="holo-inner" id="holo-inner-${i}">
          <div class="holo-back"><div class="holo-back-inner">✦</div></div>
          <div class="holo-face">
            <div class="holo-bg-layer"></div>
            <div class="holo-face-border"></div>
            <div class="holo-card-num">${sc.num}</div>
            <div class="holo-art-layer"><img src="${CARD_IMG[sc.id]}" loading="lazy" alt="${sc.nameZh}"></div>
            <div class="holo-card-name">${sc.name}</div>
            <div class="holo-card-zh">${sc.nameZh}</div>
            <div class="holo-shimmer"></div>
            <div class="holo-foil"></div>
            <div class="holo-sparkle"></div>
          </div>
        </div>
      </div>
      <div class="holo-pos-label" id="holo-label-${i}">${POSITIONS[i]}</div>
    `;
    spread.appendChild(col);
    if(i===0) addTapHint(col.querySelector('.holo-card-wrap'));
    col.querySelector('.holo-card-wrap').addEventListener('click',()=>revealCard(i));
  });
}

function addTapHint(wrap){
  const h=document.createElement('div');
  h.className='holo-tap-hint'; h.textContent='點擊揭示';
  wrap.appendChild(h);
}

function revealCard(slotIndex){
  if(slotIndex!==revealedCount) return;
  const inner=document.getElementById(`holo-inner-${slotIndex}`);
  if(inner.classList.contains('flipped')) return;
  const wrap=document.getElementById(`holo-card-${slotIndex}`);
  const label=document.getElementById(`holo-label-${slotIndex}`);
  const hint=wrap.querySelector('.holo-tap-hint');
  if(hint) hint.remove();
  inner.classList.add('flipped');
  label.classList.add('revealed');
  revealedCount++;
  showSlotReading(slotIndex);
}

function showSlotReading(slotIndex){
  const content=document.getElementById('reading-content');
  if(!readingBuckets){
    content.innerHTML='<div class="reading-loading"><div class="loading-orb">🔮</div><div class="loading-text">星象解讀中…</div></div>';
    const iv=setInterval(()=>{
      if(readingBuckets){ clearInterval(iv); showSlotReading(slotIndex); }
    },400);
    return;
  }
  const sc=selectedCards[slotIndex];
  const titles=['過去','現在','未來','行動建議'];
  const hint=content.querySelector('div[style*="點擊牌面"]');
  if(hint) hint.remove();
  const loader=content.querySelector('.reading-loading');
  if(loader) loader.remove();

  const sec=document.createElement('div');
  sec.className='reading-section';
  sec.innerHTML=`
    <div class="reading-divider"></div>
    <div class="reading-section-title">${sc.emoji}　${titles[slotIndex]}　·　${sc.nameZh}</div>
    <div class="reading-practical" id="rtext-${slotIndex}"></div>
  `;
  content.appendChild(sec);
  setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),220);

  typewrite(document.getElementById(`rtext-${slotIndex}`), readingBuckets[slotIndex]||'', 14, ()=>{
    if(slotIndex<2){ unlockNext(slotIndex+1); }
    else { showActionSection(); }
  });
}

function unlockNext(nextSlot){
  const wrap=document.getElementById(`holo-card-${nextSlot}`);
  if(!wrap) return;
  wrap.classList.remove('locked');
  addTapHint(wrap);
  // Pulse to draw attention — single gentle flash, not repetitive
  document.getElementById(`holo-inner-${nextSlot}`).animate(
    [{boxShadow:'0 0 0 0 rgba(201,168,76,0)'},{boxShadow:'0 0 22px 5px rgba(201,168,76,.45)'},{boxShadow:'0 0 0 0 rgba(201,168,76,0)'}],
    {duration:1400, iterations:1}
  );
  const content=document.getElementById('reading-content');
  const btn=document.createElement('button');
  btn.className='reveal-next-btn visible';
  btn.textContent=NEXT_LABEL[nextSlot-1];
  btn.onclick=()=>{ btn.remove(); revealCard(nextSlot); };
  content.appendChild(btn);
  setTimeout(()=>btn.scrollIntoView({behavior:'smooth',block:'nearest'}),300);
}

function showActionSection(){
  if(!readingBuckets||!readingBuckets[3]) return;
  const content=document.getElementById('reading-content');
  content.querySelectorAll('.reveal-next-btn').forEach(b=>b.remove());
  const sec=document.createElement('div');
  sec.className='reading-section';
  sec.innerHTML=`
    <div class="reading-divider"></div>
    <div class="reading-section-title">行動建議</div>
    <div class="reading-practical" id="rtext-3"></div>
  `;
  content.appendChild(sec);
  setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),220);
  typewrite(document.getElementById('rtext-3'), readingBuckets[3], 14, ()=>{
    const btn=document.getElementById('restart-btn');
    btn.style.display='block';
    setTimeout(()=>btn.scrollIntoView({behavior:'smooth',block:'nearest'}),200);
  });
}

// ═══ API PROMPT ═══
function showApiKeyPrompt(){
  const content=document.getElementById('reading-content');
  content.innerHTML=`
    <div class="api-key-section">
      <div class="api-key-label">輸入 Gemini API Key 以啟用 AI 解讀</div>
      <input class="api-key-input" id="api-key-input" type="password" placeholder="AIza...">
      <button class="api-key-btn" id="api-key-submit">✦ 開始解讀</button>
    </div>
    <div style="text-align:center;margin-top:12px;">
      <span style="font-size:11px;color:rgba(201,168,76,.3);cursor:pointer;letter-spacing:.1em;" id="skip-ai">略過 · 使用基礎解讀</span>
    </div>`;
  document.getElementById('api-key-submit').addEventListener('click',()=>{
    const k=document.getElementById('api-key-input').value.trim();
    if(!k){showToast('請輸入 API Key');return;}
    GEMINI_KEY=k;
    content.innerHTML='<div style="text-align:center;font-size:11px;color:rgba(201,168,76,.32);letter-spacing:.15em;padding:12px 0 4px;">點擊牌面以揭示命運</div>';
    callGemini();
  });
  document.getElementById('skip-ai').addEventListener('click',()=>{
    readingBuckets=buildFallback();
    content.innerHTML='<div style="text-align:center;font-size:11px;color:rgba(201,168,76,.32);letter-spacing:.15em;padding:12px 0 4px;">點擊牌面以揭示命運</div>';
  });
}

// ═══ GEMINI ═══
async function callGemini(){
  const suitLabel={major:'大阿爾克那',wands:'權杖／火元素',cups:'聖杯／水元素',swords:'寶劍／風元素',pents:'星幣／土元素'};
  const cardDesc=selectedCards.map((sc,i)=>`${POSITIONS[i]}（${POS_HINT[i]}）：${sc.nameZh}（${sc.name}）［${suitLabel[sc.suit]}］— 關鍵字：${sc.keywords.join('、')}`).join('\n');
  const prompt=`你是一位具備 20 年經驗的資深塔羅諮詢師，風格理性感性並重，解讀具體有溫度，絕不說套話。

求問者的問題：「${question}」

三張牌陣：
${cardDesc}

解讀規則：
- 每段嚴格控制在 80 字以內
- 用流暢段落，不用條列
- 緊扣求問者的問題，說具體的事不說空話
- 過去段：分析根源，這張牌帶來的是圓滿餘溫還是未解遺憾
- 現在段：指出核心衝突，以及手邊可用的籌碼
- 未來段：說明能量慣性下的自然走向，以及需要的心理調整
- 行動段：3 條具體建議編號列出，最後一句心態提醒
- 輸出時只寫解讀內容，不要重複規則或說明文字

請依序輸出，每段前單獨一行寫對應標記：

##PAST##
（過去解讀，最多80字）

##NOW##
（現在解讀，最多80字）

##FUTURE##
（未來解讀，最多80字）

##ACTION##
（3條建議編號列出，每條20字內，最後一句心態提醒）`;
  try{
    const res=await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${GEMINI_KEY}`,
      {method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:.85,maxOutputTokens:2000}})});
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      showToast((err?.error?.message||`API 錯誤 ${res.status}`).slice(0,42));
      readingBuckets=buildFallback(); return;
    }
    const data=await res.json();
    const text=data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
    readingBuckets = text ? parseBuckets(text) : buildFallback();
  }catch(e){ readingBuckets=buildFallback(); }
}

function parseBuckets(text){
  const markers=['##PAST##','##NOW##','##FUTURE##','##ACTION##'];
  return markers.map((m,i)=>{
    const s=text.indexOf(m); if(s===-1) return '';
    const cs=s+m.length;
    const ns=markers[i+1]?text.indexOf(markers[i+1]):-1;
    return (ns>-1?text.slice(cs,ns):text.slice(cs)).trim();
  });
}
function buildFallback(){
  const [p,n,f]=selectedCards;
  return [
    `${p.nameZh}的印記刻在你的根源之中，那份${p.keywords[0]}的記憶塑造了今日的你。${p.meaning}`,
    `${n.nameZh}此刻佇立眼前，呼喚你正視${n.keywords[1]}的課題。${n.meaning}`,
    `展望未來，${f.nameZh}正悄然舒展，以${f.keywords[2]}為你鋪就前行的道路。${f.meaning}`,
    `1. 每日靜心五分鐘，讓直覺引導你\n2. 對照牌義，寫下一件今日可行動的事\n3. 信任這次占卜帶給你的直覺感受\n\n記住：牌是鏡子，答案始終在你心中。`
  ];
}

// ═══ TYPEWRITE ═══
function typewrite(el,text,speed,onDone){
  el.innerHTML='<span class="typing-cursor"></span>';
  let i=0; const cursor=el.querySelector('.typing-cursor');
  const iv=setInterval(()=>{
    if(i>=text.length){ clearInterval(iv); cursor.remove(); if(onDone) onDone(); return; }
    cursor.insertAdjacentText('beforebegin',text[i++]);
    document.getElementById('reading-scroll').scrollTop+=.8;
  },speed);
}

// ═══ RESTART ═══
document.getElementById('restart-btn').addEventListener('click',()=>{
  question=''; document.getElementById('question-input').value=''; goTo('s-question');
});

// ═══ TOAST ═══
let toastTimer;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}
</script>
