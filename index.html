<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>秘儀塔羅</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #f0d080;
  --gold-dim: #7a6030;
  --deep: #06030f;
  --purple-mid: #1a0f35;
  --purple-glow: #4a1f8a;
  --card-w: 120px;
  --card-h: 200px;
  --gap: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--deep);
  color: var(--gold-light);
  font-family: 'Noto Serif TC', serif;
  height: 100dvh;
  overflow: hidden;
  user-select: none;
}

#stars-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

/* ═══ SCREENS ═══ */
.screen {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 28px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease;
}
.screen.active { opacity:1; pointer-events:all; }

/* ── S1: ENTRY ── */
#s-entry {
  background: radial-gradient(ellipse at center, #1a0f35 0%, #06030f 70%);
  gap: 28px;
}
.sigil { width:110px; height:110px; animation: sigil-rot 20s linear infinite; flex-shrink:0; }
@keyframes sigil-rot { to { transform:rotate(360deg); } }

.brand { font-family:'Cinzel Decorative',serif; font-size:26px; color:var(--gold); letter-spacing:.1em; text-shadow:0 0 30px rgba(201,168,76,.6); text-align:center; }
.brand-sub { font-size:11px; color:rgba(201,168,76,.45); letter-spacing:.35em; text-transform:uppercase; text-align:center; margin-top:4px; }

.gold-btn {
  background: transparent; border: 1px solid var(--gold);
  color: var(--gold-light); font-family: 'Cinzel',serif;
  font-size: 13px; letter-spacing: .2em; padding: 14px 40px;
  cursor: pointer; transition: all .3s; width:100%; max-width:280px;
}
.gold-btn:active { transform:scale(.97); box-shadow:0 0 18px rgba(201,168,76,.4); }

/* ── S2: QUESTION ── */
#s-question {
  background: radial-gradient(ellipse at 50% 30%, #1a0f35 0%, #06030f 65%);
  gap: 20px; justify-content: flex-start; padding-top: 72px;
}
.q-label { font-family:'Cinzel',serif; font-size:11px; letter-spacing:.3em; color:var(--gold-dim); text-transform:uppercase; text-align:center; }
.q-title { font-family:'Cinzel Decorative',serif; font-size:20px; color:var(--gold); text-align:center; line-height:1.5; text-shadow:0 0 20px rgba(201,168,76,.4); }
.q-hint { font-size:12px; color:rgba(240,208,128,.4); text-align:center; line-height:1.8; letter-spacing:.05em; }

textarea#question-input {
  width:100%; max-width:320px;
  background: rgba(26,15,53,.6); border:1px solid rgba(201,168,76,.25); border-radius:4px;
  color:var(--gold-light); font-family:'Noto Serif TC',serif;
  font-size:15px; line-height:1.8; letter-spacing:.05em;
  padding:16px 18px; resize:none; height:110px; outline:none;
  transition:border-color .3s; -webkit-appearance:none;
}
textarea#question-input::placeholder { color:rgba(201,168,76,.25); }
textarea#question-input:focus { border-color:rgba(201,168,76,.6); }

.q-examples { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; width:100%; max-width:320px; }
.q-example {
  border:1px solid rgba(201,168,76,.2); padding:6px 14px;
  font-size:11px; color:rgba(201,168,76,.55); cursor:pointer;
  border-radius:2px; letter-spacing:.05em; transition:all .2s;
}
.q-example:active { border-color:var(--gold); color:var(--gold); }

/* ── S3: SHUFFLE ── */
#s-shuffle { background:var(--deep); gap:24px; }
.shuffle-orb {
  width:120px; height:120px; border-radius:50%;
  background: radial-gradient(circle,rgba(74,31,138,.8) 0%,rgba(6,3,15,0) 70%);
  border:1px solid rgba(201,168,76,.2);
  display:flex; align-items:center; justify-content:center; font-size:48px;
  animation: orb-pulse 2s ease-in-out infinite;
}
@keyframes orb-pulse { 0%,100%{box-shadow:0 0 20px rgba(74,31,138,.4);transform:scale(1)} 50%{box-shadow:0 0 50px rgba(74,31,138,.8);transform:scale(1.05)} }
.shuffle-title { font-family:'Cinzel Decorative',serif; font-size:18px; color:var(--gold); letter-spacing:.1em; text-align:center; }
.shuffle-q-echo { font-size:13px; color:rgba(240,208,128,.6); text-align:center; line-height:1.8; letter-spacing:.05em; max-width:260px; font-style:italic; }
.shuffle-hint { font-size:11px; color:rgba(201,168,76,.35); letter-spacing:.15em; text-align:center; }

/* ── S4: CARD SELECTION ── */
#s-cards {
  background:var(--deep);
  justify-content:flex-start; padding:0; gap:0;
}
.cards-header { padding:22px 24px 10px; text-align:center; flex-shrink:0; }
.cards-title { font-family:'Cinzel Decorative',serif; font-size:16px; color:var(--gold); letter-spacing:.12em; text-shadow:0 0 16px rgba(201,168,76,.4); }
.cards-q-echo { font-size:11px; color:rgba(240,208,128,.4); letter-spacing:.05em; margin-top:5px; max-width:280px; margin-inline:auto; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.header-line { width:50px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:8px auto 0; }

.tilt-hint { text-align:center; font-size:11px; color:rgba(240,208,128,.35); letter-spacing:.1em; padding:6px 24px; flex-shrink:0; transition:opacity .5s; }

.scene { flex:1; display:flex; align-items:center; justify-content:center; perspective:1200px; position:relative; overflow:hidden; min-height:0; }
.glow-layer { position:absolute; inset:0; pointer-events:none; z-index:0; }
.ambient-glow { position:absolute; border-radius:50%; filter:blur(60px); opacity:.1; }
.glow-1 { width:180px; height:180px; background:var(--purple-glow); top:15%; left:5%; }
.glow-2 { width:140px; height:140px; background:#1f5a99; bottom:20%; right:5%; }

.card-strip { display:flex; align-items:center; gap:var(--gap); position:relative; z-index:1; transform-style:preserve-3d; will-change:transform; padding:30px 50px; }

/* ── CARD ── */
.tarot-card { width:var(--card-w); height:var(--card-h); flex-shrink:0; position:relative; transform-style:preserve-3d; cursor:pointer; border-radius:8px; }
.tarot-card.is-flipping { transition:transform .75s cubic-bezier(.4,0,.2,1) !important; }

.card-face { position:absolute; inset:0; border-radius:8px; backface-visibility:hidden; -webkit-backface-visibility:hidden; overflow:hidden; }
.card-back { background:var(--purple-mid); border:1px solid rgba(201,168,76,.3); display:flex; align-items:center; justify-content:center; }
.card-back-inner { width:88%; height:88%; border:1px solid rgba(201,168,76,.18); border-radius:4px; display:flex; align-items:center; justify-content:center; background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(201,168,76,.04) 8px,rgba(201,168,76,.04) 9px); }
.card-back-symbol { font-size:30px; opacity:.4; }

.card-front { transform:rotateY(180deg); background:linear-gradient(160deg,#1c1030 0%,#0a061a 100%); border:1px solid rgba(201,168,76,.45); display:flex; flex-direction:column; align-items:center; padding:8px 6px; }
.card-front-border { position:absolute; inset:5px; border:1px solid rgba(201,168,76,.18); border-radius:4px; pointer-events:none; }
.card-number { font-family:'Cinzel',serif; font-size:8px; letter-spacing:.3em; color:var(--gold-dim); margin-bottom:3px; }
.card-artwork { width:100%; flex:1; display:flex; align-items:center; justify-content:center; font-size:44px; position:relative; }
.card-artwork-glow { position:absolute; inset:0; background:radial-gradient(ellipse,rgba(201,168,76,.1) 0%,transparent 70%); }
.card-name { font-family:'Cinzel',serif; font-size:8px; letter-spacing:.18em; color:var(--gold); text-align:center; margin-top:4px; line-height:1.4; }
.card-name-zh { font-size:8px; color:rgba(201,168,76,.55); margin-top:2px; }

.card-pos-label { position:absolute; top:-26px; left:50%; transform:translateX(-50%); font-family:'Cinzel',serif; font-size:8px; letter-spacing:.2em; color:rgba(201,168,76,.75); white-space:nowrap; opacity:0; transition:opacity .4s; pointer-events:none; }

@keyframes breathe { 0%,100%{opacity:.85} 50%{opacity:1} }
.idle-breathe { animation:breathe 3s ease-in-out infinite; }

.focus-ring { position:absolute; inset:-4px; border:1px solid var(--gold); border-radius:10px; opacity:0; pointer-events:none; animation:focus-pulse 2s ease-in-out infinite; }
@keyframes focus-pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
.tarot-card.is-focused .focus-ring { opacity:1; }
.tarot-card.is-focused .card-pos-label { opacity:1; }

/* Slot indicator */
.slot-indicator { display:flex; gap:16px; justify-content:center; padding:6px 0; flex-shrink:0; }
.slot-pip { display:flex; flex-direction:column; align-items:center; gap:4px; }
.slot-pip-dot { width:6px; height:6px; border-radius:50%; background:rgba(201,168,76,.15); transition:all .3s; }
.slot-pip-label { font-size:8px; letter-spacing:.12em; color:rgba(201,168,76,.3); font-family:'Cinzel',serif; }
.slot-pip.filled .slot-pip-dot { background:var(--gold); box-shadow:0 0 8px rgba(201,168,76,.6); }
.slot-pip.filled .slot-pip-label { color:rgba(201,168,76,.7); }

.cards-footer { padding:10px 24px 20px; display:flex; align-items:center; justify-content:center; gap:12px; flex-shrink:0; }
.footer-btn { background:none; border:1px solid rgba(201,168,76,.22); color:rgba(201,168,76,.55); font-family:'Cinzel',serif; font-size:10px; letter-spacing:.15em; padding:9px 16px; cursor:pointer; border-radius:2px; transition:all .3s; }
.footer-btn:active { border-color:var(--gold); color:var(--gold); box-shadow:0 0 10px rgba(201,168,76,.3); }
.footer-btn.primary { border-color:rgba(201,168,76,.5); color:rgba(201,168,76,.85); font-size:11px; padding:10px 20px; }

/* ── S5: READING ── */
#s-reading { background:var(--deep); justify-content:flex-start; padding:0; overflow:hidden; }
.reading-scroll { width:100%; height:100%; overflow-y:auto; padding:36px 28px 60px; -webkit-overflow-scrolling:touch; }
.reading-header { text-align:center; margin-bottom:20px; }
.reading-title { font-family:'Cinzel Decorative',serif; font-size:17px; color:var(--gold); letter-spacing:.12em; text-shadow:0 0 20px rgba(201,168,76,.4); }
.reading-question { font-size:12px; color:rgba(240,208,128,.5); margin-top:8px; letter-spacing:.05em; font-style:italic; line-height:1.7; }

.spread-row { display:flex; gap:10px; justify-content:center; margin:18px 0; }
.spread-card-mini { flex:1; max-width:88px; background:linear-gradient(160deg,#1c1030,#0a061a); border:1px solid rgba(201,168,76,.3); border-radius:6px; padding:10px 6px; display:flex; flex-direction:column; align-items:center; gap:4px; }
.spread-pos { font-family:'Cinzel',serif; font-size:7px; letter-spacing:.2em; color:var(--gold-dim); }
.spread-emoji { font-size:26px; }
.spread-name { font-family:'Cinzel',serif; font-size:7px; color:var(--gold); letter-spacing:.1em; text-align:center; line-height:1.4; }
.spread-name-zh { font-size:7px; color:rgba(201,168,76,.5); }

.reading-divider { height:1px; background:linear-gradient(90deg,transparent,rgba(201,168,76,.3),transparent); margin:18px 0; }

.reading-section { margin-bottom:24px; }
.reading-section-title { font-family:'Cinzel',serif; font-size:10px; letter-spacing:.3em; color:var(--gold-dim); text-transform:uppercase; margin-bottom:12px; display:flex; align-items:center; gap:10px; }
.reading-section-title::before,.reading-section-title::after { content:''; flex:1; height:1px; background:rgba(201,168,76,.15); }

.reading-poetic { font-style:italic; color:rgba(240,208,128,.75); line-height:2.2; font-size:14px; letter-spacing:.06em; border-left:2px solid rgba(201,168,76,.25); padding-left:16px; }
.reading-practical { color:rgba(240,208,128,.85); line-height:2; font-size:13px; letter-spacing:.04em; white-space:pre-wrap; }

.typing-cursor { display:inline-block; width:2px; height:1em; background:var(--gold); margin-left:2px; vertical-align:middle; animation:blink .8s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.reading-loading { display:flex; flex-direction:column; align-items:center; gap:16px; padding:40px 0; }
.loading-orb { width:60px; height:60px; border-radius:50%; border:1px solid rgba(201,168,76,.3); display:flex; align-items:center; justify-content:center; font-size:28px; animation:orb-pulse 1.5s ease-in-out infinite; }
.loading-text { font-size:12px; color:rgba(201,168,76,.5); letter-spacing:.15em; }

.reading-restart-btn { margin-top:32px; width:100%; background:transparent; border:1px solid rgba(201,168,76,.22); color:rgba(201,168,76,.55); font-family:'Cinzel',serif; font-size:11px; letter-spacing:.2em; padding:14px; cursor:pointer; transition:all .3s; }
.reading-restart-btn:active { border-color:var(--gold); color:var(--gold); }

/* API KEY PROMPT */
.api-key-section { margin-top:24px; padding:16px; border:1px solid rgba(201,168,76,.15); border-radius:4px; background:rgba(26,15,53,.4); }
.api-key-label { font-size:11px; color:rgba(201,168,76,.5); letter-spacing:.1em; margin-bottom:8px; text-align:center; }
.api-key-input { width:100%; background:rgba(6,3,15,.6); border:1px solid rgba(201,168,76,.2); border-radius:3px; color:var(--gold-light); font-family:monospace; font-size:12px; padding:10px 12px; outline:none; letter-spacing:.05em; }
.api-key-input::placeholder { color:rgba(201,168,76,.2); }
.api-key-btn { width:100%; margin-top:8px; background:none; border:1px solid rgba(201,168,76,.3); color:rgba(201,168,76,.7); font-family:'Cinzel',serif; font-size:11px; letter-spacing:.15em; padding:10px; cursor:pointer; border-radius:2px; }

/* ── TOAST ── */
.toast { position:fixed; top:52px; left:50%; transform:translateX(-50%) translateY(-16px); background:rgba(201,168,76,.12); border:1px solid rgba(201,168,76,.28); color:var(--gold-light); font-size:11px; letter-spacing:.1em; padding:9px 22px; border-radius:2px; opacity:0; transition:all .3s; z-index:200; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div class="toast" id="toast"></div>

<!-- S1: ENTRY -->
<div class="screen active" id="s-entry">
  <svg class="sigil" viewBox="0 0 120 120" fill="none">
    <circle cx="60" cy="60" r="55" stroke="#c9a84c" stroke-width=".5" stroke-dasharray="4 4"/>
    <circle cx="60" cy="60" r="42" stroke="#c9a84c" stroke-width=".3" opacity=".5"/>
    <polygon points="60,10 105,85 15,85" stroke="#c9a84c" stroke-width=".8" fill="none" opacity=".7"/>
    <polygon points="60,110 15,35 105,35" stroke="#c9a84c" stroke-width=".5" fill="none" opacity=".4"/>
    <circle cx="60" cy="60" r="6" stroke="#c9a84c" stroke-width="1" fill="rgba(201,168,76,0.1)"/>
    <circle cx="60" cy="10" r="3" fill="#c9a84c" opacity=".8"/>
    <circle cx="105" cy="85" r="3" fill="#c9a84c" opacity=".8"/>
    <circle cx="15" cy="85" r="3" fill="#c9a84c" opacity=".8"/>
  </svg>
  <div>
    <div class="brand">秘儀塔羅</div>
    <div class="brand-sub">Arcana Mysterium</div>
  </div>
  <p style="font-size:13px;color:rgba(240,208,128,.5);text-align:center;line-height:2;letter-spacing:.05em;">
    透過星象感應，三張牌揭示<br>過去・現在・未來<br>讓宇宙為你的問題發聲
  </p>
  <button class="gold-btn" id="enter-btn">✦ 進入儀式 ✦</button>
  <div style="font-size:10px;color:rgba(201,168,76,.22);letter-spacing:.12em;text-align:center;margin-top:-8px;">需要 HTTPS 環境以啟動感應器</div>
</div>

<!-- S2: QUESTION -->
<div class="screen" id="s-question">
  <div class="q-label">第一步 · Step One</div>
  <div class="q-title">寫下你心中的問題</div>
  <p class="q-hint">越具體的問題，得到的指引越清晰</p>
  <textarea id="question-input" placeholder="例：我與這段關係的未來走向是什麼？"></textarea>
  <div class="q-examples">
    <div class="q-example" data-q="這份工作機會適合我嗎？">工作機會</div>
    <div class="q-example" data-q="我與這段感情的未來走向是什麼？">感情方向</div>
    <div class="q-example" data-q="我現在最需要關注的事情是什麼？">當下指引</div>
    <div class="q-example" data-q="我應該如何走出目前的困境？">走出困境</div>
  </div>
  <button class="gold-btn" id="question-submit-btn" style="max-width:240px;">繼續 · 進行洗牌</button>
</div>

<!-- S3: SHUFFLE -->
<div class="screen" id="s-shuffle">
  <div class="shuffle-orb">🌀</div>
  <div class="shuffle-title">靜心 · 洗牌儀式</div>
  <div class="shuffle-q-echo" id="shuffle-q-echo"></div>
  <p class="shuffle-hint">專注於你的問題<br>感受牌與你之間的連結</p>
  <button class="gold-btn" id="shuffle-done-btn" style="max-width:260px;">✦ 牌已洗好，開始選牌</button>
</div>

<!-- S4: CARD SELECTION -->
<div class="screen" id="s-cards">
  <div class="cards-header">
    <div class="cards-title">選擇三張命運之牌</div>
    <div class="cards-q-echo" id="cards-q-echo"></div>
    <div class="header-line"></div>
  </div>
  <div class="tilt-hint">傾斜手機瀏覽 · 點擊「選取此牌」</div>

  <div class="scene" id="scene">
    <div class="glow-layer" id="glow-layer">
      <div class="ambient-glow glow-1"></div>
      <div class="ambient-glow glow-2"></div>
    </div>
    <div class="card-strip" id="card-strip"></div>
  </div>

  <div class="slot-indicator" id="slot-indicator">
    <div class="slot-pip" data-slot="0"><div class="slot-pip-dot"></div><div class="slot-pip-label">過去</div></div>
    <div class="slot-pip" data-slot="1"><div class="slot-pip-dot"></div><div class="slot-pip-label">現在</div></div>
    <div class="slot-pip" data-slot="2"><div class="slot-pip-dot"></div><div class="slot-pip-label">未來</div></div>
  </div>

  <div class="cards-footer">
    <button class="footer-btn" id="calibrate-btn">校準</button>
    <button class="footer-btn primary" id="select-card-btn">✦ 選取此牌</button>
    <button class="footer-btn" id="reshuffle-btn">重洗</button>
  </div>
</div>

<!-- S5: READING -->
<div class="screen" id="s-reading">
  <div class="reading-scroll" id="reading-scroll">
    <div class="reading-header">
      <div class="reading-title">✦ 牌陣解讀 ✦</div>
      <div class="reading-question" id="reading-q"></div>
    </div>
    <div class="spread-row" id="spread-row"></div>
    <div class="reading-divider"></div>
    <div id="reading-content"></div>
    <button class="reading-restart-btn" id="restart-btn">↺ 重新占卜</button>
  </div>
</div>

<script>
// ═══ GEMINI KEY ═══
// Set window.GEMINI_API_KEY = 'your-key' before this script,
// or it will ask in the reading screen.
let GEMINI_KEY = window.GEMINI_API_KEY || '';

// ═══ TAROT DATA — 78 張完整牌庫 ═══
const ALL_CARDS = [
  // ── 大阿爾克那 Major Arcana (0-21) ──
  {id:0, suit:'major',emoji:'🌟',num:'0',   name:'The Fool',         nameZh:'愚者',    keywords:['新生','冒險','無限可能'],   meaning:'靈魂踏上旅程的第一步，眼神仰望，毫不畏懼。'},
  {id:1, suit:'major',emoji:'🔮',num:'I',   name:'The Magician',     nameZh:'魔術師',  keywords:['意志','創造','資源整合'],   meaning:'你擁有將夢想化為現實的力量，所有工具就在手邊。'},
  {id:2, suit:'major',emoji:'🌙',num:'II',  name:'High Priestess',   nameZh:'女祭司',  keywords:['直覺','神秘','潛意識'],    meaning:'答案早已藏在靈魂最深處的靜默之中。'},
  {id:3, suit:'major',emoji:'👑',num:'III', name:'The Empress',      nameZh:'女皇',    keywords:['豐饒','母性','創造力'],    meaning:'大地之母的能量湧現，滋養與豐收的季節到來。'},

// ═══ STARS ═══
(function(){
  const c=document.getElementById('stars-canvas'), ctx=c.getContext('2d'); let stars=[],W,H;
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}
  function init(){stars=[];for(let i=0;i<180;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+.2,a:Math.random(),phase:Math.random()*Math.PI*2,spd:Math.random()*.003+.001});}
  let t=0;function draw(){ctx.clearRect(0,0,W,H);t+=.01;stars.forEach(s=>{const al=s.a*(.4+.6*Math.sin(t*s.spd*100+s.phase));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(240,220,160,${al})`;ctx.fill();});requestAnimationFrame(draw);}
  resize();init();draw();window.addEventListener('resize',()=>{resize();init();});
})();

function goTo(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

// ═══ S1: ENTRY ═══
document.getElementById('enter-btn').addEventListener('click', async()=>{
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    try{const r=await DeviceOrientationEvent.requestPermission();if(r==='granted')window.addEventListener('deviceorientation',handleOrientation,true);}catch(e){}
  } else { window.addEventListener('deviceorientation',handleOrientation,true); }
  if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
    try{const r=await DeviceMotionEvent.requestPermission();if(r==='granted')window.addEventListener('devicemotion',handleMotion,true);}catch(e){}
  } else { window.addEventListener('devicemotion',handleMotion,true); }
  goTo('s-question');
});

// ═══ S2: QUESTION ═══
document.querySelectorAll('.q-example').forEach(el=>{
  el.addEventListener('click',()=>{ document.getElementById('question-input').value=el.dataset.q; });
});
document.getElementById('question-submit-btn').addEventListener('click',()=>{
  const q=document.getElementById('question-input').value.trim();
  if(!q){showToast('請先輸入你的問題');return;}
  question=q;
  document.getElementById('shuffle-q-echo').textContent=`「${q}」`;
  goTo('s-shuffle');
});

// ═══ S3: SHUFFLE ═══
document.getElementById('shuffle-done-btn').addEventListener('click',()=>{
  initCardSelection();
  goTo('s-cards');
  if(!rafStarted){rafStarted=true;renderLoop();}
});

// ═══ S4: CARD SELECTION ═══
function initCardSelection(){
  selectedSlot=0; selectedCards=[null,null,null]; currentX=0; targetX=0; focusedIndex=0;
  let deck=[...ALL_CARDS];
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  cards=deck;
  document.getElementById('cards-q-echo').textContent=question;
  buildCardStrip(); updateSlotIndicator();
}

function buildCardStrip(){
  const strip=document.getElementById('card-strip');
  strip.innerHTML=''; strip.style.transform='translateX(0)';
  cards.forEach((card,i)=>{
    const el=document.createElement('div');
    el.className='tarot-card idle-breathe'; el.style.animationDelay=`${i*.12}s`; el.dataset.index=i;
    el.innerHTML=`
      <div class="card-pos-label"></div>
      <div class="card-face card-back"><div class="card-back-inner"><span class="card-back-symbol">✦</span></div></div>
      <div class="card-face card-front">
        <div class="card-front-border"></div>
        <div class="card-number">${card.num}</div>
        <div class="card-artwork"><div class="card-artwork-glow"></div>${card.emoji}</div>
        <div class="card-name">${card.name}</div>
        <div class="card-name-zh">${card.nameZh}</div>
      </div>
      <div class="focus-ring"></div>
    `;
    strip.appendChild(el);
  });
  updateFocus(0,false);
}

function getCardEls(){return[...document.getElementById('card-strip').querySelectorAll('.tarot-card')];}

function updateFocus(idx,animate=true){
  const els=getCardEls();
  els.forEach((el,i)=>{
    el.classList.remove('is-focused');
    const dist = Math.abs(i - idx);
    const bri = dist===0 ? 1 : dist===1 ? 0.78 : 0.5;
    el.style.transition=animate?'filter .3s':'none';
    const slot=selectedCards.findIndex(sc=>sc&&sc.deckIndex===i);
    const rotY=slot>=0?180:0;
    el.style.transform=`rotateY(${rotY}deg)`;
    el.style.filter=`brightness(${bri})`;
    el.querySelector('.card-pos-label').textContent=slot>=0?POSITIONS[slot]:'';
  });
  if(els[idx])els[idx].classList.add('is-focused');
  focusedIndex=idx;
}

function updateSlotIndicator(){
  document.querySelectorAll('.slot-pip').forEach((pip,i)=>pip.classList.toggle('filled',selectedCards[i]!==null));
}

document.getElementById('select-card-btn').addEventListener('click',()=>{
  if(selectedSlot>=3)return;
  const cardData=cards[focusedIndex];
  if(selectedCards.some(sc=>sc&&sc.id===cardData.id)){showToast('這張牌已被選取');return;}
  selectedCards[selectedSlot]={...cardData,deckIndex:focusedIndex};
  const el=getCardEls()[focusedIndex];
  el.classList.add('is-flipping'); el.classList.remove('idle-breathe');
  el.style.transform=`translateY(-6px) rotateY(180deg)`;
  el.querySelector('.card-pos-label').textContent=POSITIONS[selectedSlot];
  setTimeout(()=>el.classList.remove('is-flipping'),750);
  selectedSlot++;
  updateSlotIndicator();
  if(selectedSlot>=3){showToast('三張牌已選定，正在解讀…');setTimeout(startReading,900);}
  else showToast(`已選「${cardData.nameZh}」· 請繼續選第 ${selectedSlot+1} 張`);
});

document.getElementById('reshuffle-btn').addEventListener('click',()=>{initCardSelection();showToast('牌已重新洗牌');});
document.getElementById('calibrate-btn').addEventListener('click',()=>{
  window.addEventListener('deviceorientation',e=>{if(e.gamma!==null){gammaRef=e.gamma;showToast('已校準水平基準');}},{once:true});
});

// ═══ GYROSCOPE ═══
function handleOrientation(e){
  if(e.gamma===null||!document.getElementById('s-cards').classList.contains('active'))return;
  // 角度門檻擴大到 ±75°，需要更大幅度傾斜才能跑完整排
  const g=Math.max(-75,Math.min(75,e.gamma-gammaRef));
  const maxOff=(cards.length-1)*CARD_STEP*.5;
  targetX=-(g/75)*maxOff;
}
let lastAcc={x:0,y:0,z:0},shakeThrottle=false;
function handleMotion(e){
  const acc=e.acceleration;if(!acc)return;
  const d=Math.abs(acc.x-lastAcc.x)+Math.abs(acc.y-lastAcc.y)+Math.abs(acc.z-lastAcc.z);
  lastAcc={x:acc.x||0,y:acc.y||0,z:acc.z||0};
  if(d>28&&!shakeThrottle&&document.getElementById('s-cards').classList.contains('active')){
    shakeThrottle=true;document.getElementById('select-card-btn').click();
    setTimeout(()=>shakeThrottle=false,1300);
  }
}

// ═══ RENDER LOOP ═══
function renderLoop(){
  currentX+=(targetX-currentX)*.12;
  const strip=document.getElementById('card-strip');
  const glow=document.getElementById('glow-layer');
  if(strip){
    strip.style.transform=`translateX(${currentX}px) rotateY(${currentX*.012}deg)`;
    glow.style.transform=`translateX(${currentX*1.4}px)`;
    const nf=Math.round(-currentX/CARD_STEP+(cards.length-1)/2);
    const cl=Math.max(0,Math.min(cards.length-1,nf));
    if(cl!==focusedIndex)updateFocus(cl);
  }
  requestAnimationFrame(renderLoop);
}

// ═══ S5: READING ═══
function startReading(){
  goTo('s-reading');
  document.getElementById('reading-q').textContent=`「${question}」`;
  document.getElementById('spread-row').innerHTML=selectedCards.map((sc,i)=>`
    <div class="spread-card-mini">
      <div class="spread-pos">${POSITIONS[i]}</div>
      <div class="spread-emoji">${sc.emoji}</div>
      <div class="spread-name">${sc.name}</div>
      <div class="spread-name-zh">${sc.nameZh}</div>
    </div>`).join('');

  document.getElementById('reading-content').innerHTML=`
    <div class="reading-loading">
      <div class="loading-orb">🔮</div>
      <div class="loading-text">星象正在匯聚…</div>
    </div>`;

  if(GEMINI_KEY){ callGemini(); }
  else { showApiKeyPrompt(); }
}

function showApiKeyPrompt(){
  const content=document.getElementById('reading-content');
  content.innerHTML=`
    <div class="api-key-section">
      <div class="api-key-label">輸入 Gemini API Key 以啟用 AI 解讀</div>
      <input class="api-key-input" id="api-key-input" type="password" placeholder="AIza...">
      <button class="api-key-btn" id="api-key-submit">✦ 開始解讀</button>
    </div>
    <div style="text-align:center;margin-top:12px;">
      <span style="font-size:11px;color:rgba(201,168,76,.3);cursor:pointer;letter-spacing:.1em;" id="skip-ai">略過 · 使用基礎解讀</span>
    </div>`;
  document.getElementById('api-key-submit').addEventListener('click',()=>{
    const k=document.getElementById('api-key-input').value.trim();
    if(!k){showToast('請輸入 API Key');return;}
    GEMINI_KEY=k;
    content.innerHTML=`<div class="reading-loading"><div class="loading-orb">🔮</div><div class="loading-text">星象正在匯聚…</div></div>`;
    callGemini();
  });
  document.getElementById('skip-ai').addEventListener('click',showFallback);
}

async function callGemini(){
  const content=document.getElementById('reading-content');
  const suitLabel={major:'大阿爾克那',wands:'權杖／火元素',cups:'聖杯／水元素',swords:'寶劍／風元素',pents:'星幣／土元素'};
  const cardDesc=selectedCards.map((sc,i)=>`${POSITIONS[i]}（${POS_HINT[i]}）：${sc.nameZh}（${sc.name}）［${suitLabel[sc.suit]}］— 關鍵字：${sc.keywords.join('、')}`).join('\n');
  const prompt=`你是一位具備 20 年經驗的資深塔羅諮詢師。你的解讀風格具體、深入、有溫度，絕對不說泛泛的套話。你始終緊扣求問者的問題來解讀每一張牌，讓對方感覺「你真的在說我的事」。

求問者的問題：「${question}」

三張牌陣：
${cardDesc}

請用繁體中文進行完整解讀。你必須嚴格使用以下標記分隔段落，每個標記單獨佔一行，前後不加任何符號：

##PAST##
解讀「過去」這張牌。這個位置代表導致目前處境的根源、背景、或過去做過的決定。請針對求問者的問題，詳細說明：
- 過去發生了什麼具體的事情或心境？
- 為什麼會走到今天這個局面？這張牌揭示了什麼根本原因？
- 這段過去對求問者造成了什麼影響，留下了什麼？
寫 5-7 句，語氣直接有溫度，像面對面在說話。

##NOW##
解讀「現在」這張牌。這個位置代表求問者當下正在經歷的核心處境與挑戰。請針對求問者的問題，詳細說明：
- 求問者現在實際面對的是什麼情況？
- 這張牌指出了什麼核心課題或關鍵轉捩點？
- 現在最需要正視的事情是什麼？有什麼機會或危機正在發生？
寫 5-7 句，讓求問者感覺「說中了我現在的狀態」。

##FUTURE##
解讀「未來」這張牌。這個位置代表如果按照牌的能量走，事情會往哪個方向發展。請針對求問者的問題，詳細說明：
- 未來最可能出現的具體走向是什麼？
- 會有什麼轉變或結果？時間感上是快還是慢？
- 要讓這個未來成真，或要避免壞的結果，求問者需要做什麼或注意什麼？
寫 5-7 句，給求問者清楚的方向感，不要模糊帶過。

##ACTION##
根據以上三張牌的整體訊息，針對求問者的問題「${question}」，給出 3 個具體可執行的行動建議。每個建議用一句話說清楚做什麼、怎麼做、為什麼這樣做。編號列出。最後加一句心態提醒。`;

  try{
    const res=await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,
      {method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:.85,maxOutputTokens:4000}})});
    if(!res.ok)throw new Error(res.status);
    const data=await res.json();
    const text=data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
    if(!text)throw new Error('empty');
    renderReading(text);
  }catch(e){
    console.error(e);
    if(e.message==='400'||e.message==='403'){GEMINI_KEY='';showToast('API Key 無效，請重新輸入');showApiKeyPrompt();}
    else showFallback();
  }
}

function renderReading(text){
  const markers  = ['##PAST##','##NOW##','##FUTURE##','##ACTION##'];
  const titles   = ['過去','現在','未來','行動建議'];

  const buckets = markers.map((marker, i) => {
    const start = text.indexOf(marker);
    if(start === -1) return '';
    const contentStart = start + marker.length;
    const nextMarker = markers[i+1] ? text.indexOf(markers[i+1]) : -1;
    const content = nextMarker > -1
      ? text.slice(contentStart, nextMarker)
      : text.slice(contentStart);
    return content.trim();
  });

  // Fallback: paragraph split if no markers found
  if(!buckets.some(b => b.length > 0)){
    const paras = text.trim().split(/\n\n+/);
    const third = Math.ceil(paras.length / 4);
    buckets[0] = paras.slice(0, third).join('\n\n');
    buckets[1] = paras.slice(third, third*2).join('\n\n');
    buckets[2] = paras.slice(third*2, third*3).join('\n\n');
    buckets[3] = paras.slice(third*3).join('\n\n');
  }

  // Card emojis for section headers
  const cardEmojis = selectedCards.map(sc => sc?.emoji || '');

  document.getElementById('reading-content').innerHTML = buckets.map((s,i) => `
    <div class="reading-section">
      <div class="reading-section-title">${cardEmojis[i] ? cardEmojis[i] + '　' : ''}${titles[i]}${selectedCards[i] ? '　·　' + selectedCards[i].nameZh : ''}</div>
      <div class="reading-practical" id="section-${i}"></div>
    </div>`).join('');

  function writeSection(i){
    if(i >= buckets.length) return;
    const el = document.getElementById(`section-${i}`);
    if(!el || !buckets[i]) return writeSection(i+1);
    typewrite(el, buckets[i], 14, () => setTimeout(() => writeSection(i+1), 300));
  }
  writeSection(0);
}

function typewrite(el,text,speed,onDone){
  el.innerHTML='<span class="typing-cursor"></span>';
  let i=0;const cursor=el.querySelector('.typing-cursor');
  const iv=setInterval(()=>{
    if(i>=text.length){clearInterval(iv);cursor.remove();if(onDone)onDone();return;}
    cursor.insertAdjacentText('beforebegin',text[i++]);
    document.getElementById('reading-scroll').scrollTop+=.8;
  },speed);
}

function showFallback(){
  const [p,n,f]=selectedCards;
  const poetic=`${p.nameZh}的印記刻在你的根源之中，那份${p.keywords[0]}的記憶塑造了今日的你。${n.nameZh}此刻佇立眼前，呼喚你正視${n.keywords[1]}的課題。而遠方，${f.nameZh}正悄然舒展，以${f.keywords[2]}為你鋪就前行的道路。`;
  const practical=`過去的${p.nameZh}告訴你：${p.meaning}\n\n現在的${n.nameZh}提醒你：${n.meaning}\n\n展望未來，${f.nameZh}帶來訊息：${f.meaning}`;
  renderReading(`${poetic}\n\n${practical}`);
}

// ═══ RESTART ═══
document.getElementById('restart-btn').addEventListener('click',()=>{
  question=''; document.getElementById('question-input').value=''; goTo('s-question');
});

// ═══ TOAST ═══
let toastTimer;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2200);}
</script>
